# setup-steps/go.yml — Go
# Spliced into the stack-setup section of wolfe-run.yml by wolfe-pack init.
# setup-go reads go.mod for the version and enables its built-in module cache.

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          # Reads the `go` directive from go.mod; pin to a range if you need to.
          go-version-file: "go.mod"
          cache: true
